<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Grêmio DEGAN</title>

    <link rel="stylesheet" href="css/login.css">
</head>

<body>

<div class="container">

    <div class="login-box">

        <h1>🐦‍🔥</h1>

        <h2>Grêmio DEGAN</h2>

        <p>Painel Administrativo</p>

        <form id="loginForm">

            <div class="campo">

                <input
                    type="email"
                    id="email"
                    required>

                <label>E-mail</label>

            </div>

            <div class="campo">

                <input
                    type="password"
                    id="senha"
                    required>

                <label>Senha</label>

            </div>

            <button type="submit">
                Entrar
            </button>

        </form>

        <p id="mensagem"></p>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/login.js"></script>

</body>
</html>
