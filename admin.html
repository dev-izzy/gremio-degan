<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Administrativo - Grêmio DEGAN</title>

    <link rel="stylesheet" href="css/admin.css">
</head>
<body>

<div class="container">

    <aside class="sidebar">

        <h2>🐦‍🔥 DEGAN</h2>

        <ul>
            <li><a href="#" onclick="logout()">🚪 Sair</a></li>
        </ul>

    

    </aside>

    <main class="conteudo">

        <h1>Painel Administrativo</h1>

        <section id="dashboard">

            <div class="cards">

                <div class="card">
                    <h3>Sugestões</h3>
                    <h2 id="totalSugestoes">0</h2>
                </div>

                <div class="card">
                    <h3>Notícias</h3>
                    <h2 id="totalNoticias">0</h2>
                </div>

                <div class="card">
                    <h3>Eventos</h3>
                    <h2 id="totalEventos">0</h2>
                </div>

            </div>

        </section>

        <section id="sugestoes">

            <h2>💬 Sugestões</h2>

            <table>

                <thead>

                    <tr>
                        <th>Nome</th>
                        <th>Sugestão</th>
                        <th>Data</th>
                        <th>Ações</th>
                    </tr>

                </thead>

                <tbody id="listaSugestoes">

                </tbody>

            </table>

        </section>

        <section id="noticias">

            <h2>📰 Nova Notícia</h2>

            <input
                type="text"
                id="tituloNoticia"
                placeholder="Título">

            <textarea
                id="textoNoticia"
                rows="6"
                placeholder="Digite a notícia..."></textarea>

            <button onclick="publicarNoticia()">
                Publicar
            </button>

        </section>

        <section id="eventos">

            <h2>📅 Novo Evento</h2>

            <input
                type="text"
                id="nomeEvento"
                placeholder="Nome do evento">

            <input
                type="date"
                id="dataEvento">

            <textarea
                id="descricaoEvento"
                rows="5"
                placeholder="Descrição"></textarea>

            <button onclick="salvarEvento()">
                Salvar Evento
            </button>

        </section>

        <section id="diretoria">

            <h2>👥 Diretoria</h2>

            <table>

                <thead>

                    <tr>
                        <th>Cargo</th>
                        <th>Nome</th>
                    </tr>

                </thead>

                <tbody id="listaDiretoria">

                </tbody>

            </table>

            <button onclick="salvarDiretoria()">
                Salvar Alterações
            </button>

        </section>

    </main>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/admin.js"></script>

</body>
</html>
