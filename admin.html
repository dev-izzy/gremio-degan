<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Painel Administrativo | Grêmio DEGAN</title>

    <link rel="shortcut icon" href="icone/WhatsApp-Image-2026-07-07-at-18.50.30.ico" type="image/x-icon">

    <link rel="stylesheet" href="css/admin.css">

</head>

<body>

<div class="container">

<aside class="sidebar">

    <div>

        <div class="logo-box">
            <img src="img/WhatsApp Image 2026-07-07 at 18.50.30.jpeg" alt="Logo">
        </div>

        <div class="logo">
            <h2>Grêmio DEGAN</h2>
            <h6>Painel Administrativo</h6>
        </div>

        <hr class="linha">

        <nav>

            <button class="menu ativo" onclick="mostrarPagina('dashboard', this)">
                📊 Dashboard
            </button>

            <button class="menu" onclick="mostrarPagina('sugestoes', this)">
                💡 Sugestões
            </button>

            <button class="menu" onclick="mostrarPagina('noticias', this)">
                📰 Notícias
            </button>

            <button class="menu" onclick="mostrarPagina('eventos', this)">
                📅 Eventos
            </button>

            <button class="menu" onclick="mostrarPagina('diretoria', this)">
                👥 Diretoria
            </button>

        </nav>

    </div>

    <button id="logout">
        🚪 Sair
    </button>

</aside>

    <!-- CONTEÚDO -->

    <main class="conteudo">

        <!-- DASHBOARD -->

        <section id="dashboard">

            <h1>Dashboard</h1>

            <div class="cards">

                <div class="card">

                    <h3>Sugestões</h3>

                    <p id="totalSugestoes">0</p>

                </div>

                <div class="card">

                    <h3>Notícias</h3>

                    <p id="totalNoticias">0</p>

                </div>

                <div class="card">

                    <h3>Eventos</h3>

                    <p id="totalEventos">0</p>

                </div>

            </div>

        </section>

        <!-- SUGESTÕES -->

        <section id="sugestoes" class="pagina">

            <h1>Sugestões</h1>

            <table>

                <thead>

                    <tr>

                        <th>Nome</th>
                        <th>Sugestão</th>
                        <th>Data</th>
                        <th>Ações</th>

                    </tr>

                </thead>

                <tbody id="listaSugestoes">

                </tbody>

            </table>

        </section>

        <!-- NOTÍCIAS -->

        <section id="noticias" class="pagina">

            <h1>Nova Notícia</h1>

            <input
                type="text"
                id="tituloNoticia"
                placeholder="Título da notícia">

            <textarea
                id="textoNoticia"
                rows="8"
                placeholder="Digite a notícia"></textarea>

            <button id="btnPublicar">

                Publicar

            </button>

            <hr>

            <h2>Notícias Publicadas</h2>

            <div id="listaNoticias">

            </div>

        </section>

        <!-- EVENTOS -->

        <section id="eventos" class="pagina">

            <h1>Novo Evento</h1>

            <input
                type="text"
                id="nomeEvento"
                placeholder="Nome do evento">

            <input
                type="date"
                id="dataEvento">

            <textarea
                id="descricaoEvento"
                rows="6"
                placeholder="Descrição"></textarea>

            <button id="btnEvento">

                Salvar Evento

            </button>

            <hr>

            <h2>Eventos Cadastrados</h2>

            <div id="listaEventos">

            </div>

        </section>

        <!-- DIRETORIA -->

        <section id="diretoria" class="pagina">

            <h1>Diretoria</h1>

            <button id="btnNovoMembro">

                ➕ Adicionar Membro

            </button>

            <table>

                <thead>

                    <tr>

                        <th>Cargo</th>
                        <th>Nome</th>
                        <th>Ações</th>

                    </tr>

                </thead>

                <tbody id="listaDiretoria">

                </tbody>

            </table>

        </section>

    </main>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/admin.js"></script>

</body>
</html>
